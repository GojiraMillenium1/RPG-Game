<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RPG Game</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; margin:auto; background:#000; }

#battle {
  position:absolute;
  width:100%; height:100%;
  background:rgba(0,0,0,0.9);
  color:white;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#ui {
  position:absolute;
  bottom:10px;
  left:10px;
  display:none;
}

.btn {
  width:60px; height:60px;
  background:#fff3;
  margin:5px;
  text-align:center;
  line-height:60px;
  border-radius:10px;
  font-size:20px;
}
</style>
</head>
<body>

<canvas id="game" width="480" height="320"></canvas>

<div id="battle">
  <h2 id="enemyName"></h2>
  <p id="battleText"></p>
  <button onclick="attack()">Attack</button>
</div>

<div id="ui">
  <div class="btn" ontouchstart="move('up')" ontouchend="stop()">↑</div><br>
  <div class="btn" ontouchstart="move('left')" ontouchend="stop()">←</div>
  <div class="btn" ontouchstart="move('down')" ontouchend="stop()">↓</div>
  <div class="btn" ontouchstart="move('right')" ontouchend="stop()">→</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// MOBILE DETECT
if (/Mobi|Android/i.test(navigator.userAgent)) {
  document.getElementById("ui").style.display = "block";
}

// LOAD IMAGES
const img = {};
function load(name, src){
  img[name] = new Image();
  img[name].src = src;
}

load("grass","https://i.imgur.com/2RXYO.png");
load("tree","https://i.imgur.com/6RMhx.gif");
load("house","https://i.imgur.com/5EOyTDQ.png");
load("player","https://i.imgur.com/4LGAZ8t.png");

// WORLD MAP (0 = grass, 1 = tree, 2 = house, 3 = tall grass)
const map = [];
for(let y=0;y<50;y++){
  map[y]=[];
  for(let x=0;x<50;x++){
    let r = Math.random();
    if(r<0.1) map[y][x]=1;
    else if(r<0.15) map[y][x]=3;
    else map[y][x]=0;
  }
}
map[10][10]=2;

// PLAYER
let player = {
  x:200,
  y:150,
  size:32,
  hp:100
};

let camera = {x:0,y:0};

let keys = {};
let dir = null;
let inBattle = false;

// INPUT
document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

function move(d){ dir=d; }
function stop(){ dir=null; }

// ENEMIES
const enemies = [
  {name:"Slime", hp:30},
  {name:"Wolf", hp:50},
  {name:"Goblin", hp:70}
];

let currentEnemy = null;

// COLLISION
function solid(tile){
  return tile===1 || tile===2;
}

// UPDATE
function update(){
  if(inBattle) return;

  let speed = 2;
  let nx = player.x;
  let ny = player.y;

  if(keys["ArrowUp"]||dir==="up") ny-=speed;
  if(keys["ArrowDown"]||dir==="down") ny+=speed;
  if(keys["ArrowLeft"]||dir==="left") nx-=speed;
  if(keys["ArrowRight"]||dir==="right") nx+=speed;

  let tx = Math.floor(nx/32);
  let ty = Math.floor(ny/32);

  if(!solid(map[ty]?.[tx])){
    player.x = nx;
    player.y = ny;
  }

  // GRASS ENCOUNTER
  if(map[ty]?.[tx]===3 && Math.random()<0.02){
    startBattle();
  }

  camera.x = player.x - canvas.width/2;
  camera.y = player.y - canvas.height/2;
}

// DRAW MAP
function drawMap(){
  for(let y=0;y<map.length;y++){
    for(let x=0;x<map[y].length;x++){
      let tile = map[y][x];
      let px = x*32 - camera.x;
      let py = y*32 - camera.y;

      if(tile===0) ctx.drawImage(img.grass,px,py,32,32);
      if(tile===1) ctx.drawImage(img.tree,px,py,32,32);
      if(tile===2) ctx.drawImage(img.house,px,py,32,32);
      if(tile===3){
        ctx.drawImage(img.grass,px,py,32,32);
        ctx.fillStyle="rgba(0,255,0,0.3)";
        ctx.fillRect(px,py,32,32);
      }
    }
  }
}

// DRAW PLAYER
function drawPlayer(){
  ctx.drawImage(img.player, player.x-camera.x, player.y-camera.y,32,32);
}

// BATTLE
function startBattle(){
  inBattle=true;
  currentEnemy = JSON.parse(JSON.stringify(
    enemies[Math.floor(Math.random()*enemies.length)]
  ));
  document.getElementById("battle").style.display="flex";
  document.getElementById("enemyName").innerText=currentEnemy.name;
  document.getElementById("battleText").innerText="A wild "+currentEnemy.name+" appears!";
}

function attack(){
  currentEnemy.hp -= 10;
  if(currentEnemy.hp<=0){
    document.getElementById("battleText").innerText="Enemy defeated!";
    setTimeout(endBattle,1000);
  } else {
    player.hp -= 5;
    document.getElementById("battleText").innerText=
      "You hit! Enemy HP: "+currentEnemy.hp+" | Your HP: "+player.hp;
  }
}

function endBattle(){
  inBattle=false;
  document.getElementById("battle").style.display="none";
}

// LOOP
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  update();
  drawMap();
  drawPlayer();
  requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
