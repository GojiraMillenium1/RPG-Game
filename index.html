<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pocket RPG</title>
    <style>
        :root { --ui-font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: #1a1a1a; font-family: var(--ui-font); touch-action: none; }
        
        canvas { display: block; image-rendering: pixelated; }

        /* Smaller, Sleeker UI */
        .stats-bar {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.6); color: #fff;
            padding: 5px 12px; border-radius: 20px;
            font-size: 12px; border: 1px solid rgba(255,255,255,0.3);
            pointer-events: none; backdrop-filter: blur(4px);
        }

        /* Fixed Mobile Joystick */
        #joy-container {
            position: absolute; bottom: 30px; left: 30px;
            width: 100px; height: 100px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%; display: none;
            touch-action: none; border: 1px solid rgba(255,255,255,0.2);
        }
        #joy-stick {
            position: absolute; width: 40px; height: 40px;
            background: white; border-radius: 50%;
            top: 30px; left: 30px; pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Compact Dialogue */
        #dialogue {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px; background: rgba(0,0,0,0.85);
            color: white; padding: 15px; border-radius: 10px;
            display: none; font-size: 14px; border: 1px solid #444;
            pointer-events: auto; z-index: 50;
        }

        /* Battle Overlay */
        #battle-ui {
            position: absolute; inset: 0; background: #000;
            display: none; flex-direction: column; align-items: center;
            justify-content: center; z-index: 100; color: white;
        }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn {
            background: #333; color: white; border: 1px solid #555;
            padding: 10px 20px; border-radius: 5px; font-size: 13px; cursor: pointer;
        }
        .hp-label { font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

<div class="stats-bar">
    HP <span id="hp">100</span> | LVL <span id="lvl">1</span> | XP <span id="xp">0</span>
</div>

<div id="joy-container"><div id="joy-stick"></div></div>

<div id="dialogue" onclick="game.closeDialogue()">
    <div id="diag-msg"></div>
    <div style="font-size: 10px; color: #888; margin-top: 8px;">TAP TO CLOSE</div>
</div>

<div id="battle-ui">
    <div id="battle-scene" style="font-size: 40px; margin-bottom: 20px;">
        <span id="p-sprite">🧙‍♂️</span> <span style="font-size: 20px;">VS</span> <span id="e-sprite">👹</span>
    </div>
    <div class="hp-label">ENEMY HP: <span id="e-hp">50</span></div>
    <div id="battle-log" style="font-size: 14px; margin: 15px; color: #0f0;">Your turn!</div>
    <div class="btn-grid">
        <button class="btn" onclick="game.doBattle('atk')">ATTACK</button>
        <button class="btn" onclick="game.doBattle('heal')">HEAL</button>
        <button class="btn" onclick="game.doBattle('run')">RUN</button>
    </div>
</div>

<canvas id="screen"></canvas>

<script>
const TILE = 48;
const MAP_DIM = 40;

class RPG {
    constructor() {
        this.canvas = document.getElementById('screen');
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        
        this.p = { x: 100, y: 100, hp: 100, lvl: 1, xp: 0, dx: 0, dy: 0 };
        this.map = [];
        this.state = 'MAP';
        this.keys = {};
        
        this.init();
        this.bindEvents();
        this.loop();
    }

    resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
    }

    init() {
        for(let y=0; y<MAP_DIM; y++) {
            this.map[y] = [];
            for(let x=0; x<MAP_DIM; x++) {
                let val = 'grass';
                if(Math.random() > 0.9) val = 'tree';
                if(x===0 || y===0 || x===MAP_DIM-1 || y===MAP_DIM-1) val = 'tree';
                this.map[y][x] = val;
            }
        }
        this.map[5][5] = 'house';
        
        if('ontouchstart' in window) document.getElementById('joy-container').style.display = 'block';
    }

    bindEvents() {
        window.onkeydown = e => this.keys[e.code] = true;
        window.onkeyup = e => this.keys[e.code] = false;
        window.onresize = () => this.resize();

        // REWRITTEN JOYSTICK LOGIC
        const joy = document.getElementById('joy-container');
        const stick = document.getElementById('joy-stick');
        
        const handleTouch = (e) => {
            if(this.state !== 'MAP') return;
            const touch = e.touches[0];
            const rect = joy.getBoundingClientRect();
            const centerX = rect.left + rect.width/2;
            const centerY = rect.top + rect.height/2;
            
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = 40;
            
            if(dist > maxDist) {
                dx *= maxDist / dist;
                dy *= maxDist / dist;
            }
            
            stick.style.transform = `translate(${dx}px, ${dy}px)`;
            this.p.dx = dx / maxDist;
            this.p.dy = dy / maxDist;
        };

        joy.addEventListener('touchstart', handleTouch);
        joy.addEventListener('touchmove', (e) => {
            e.preventDefault();
            handleTouch(e);
        }, {passive: false});

        joy.addEventListener('touchend', () => {
            stick.style.transform = `translate(0,0)`;
            this.p.dx = 0; this.p.dy = 0;
        });
    }

    update() {
        if(this.state !== 'MAP') return;

        let mx = 0, my = 0;
        if(this.keys.KeyW || this.keys.ArrowUp) my = -1;
        if(this.keys.KeyS || this.keys.ArrowDown) my = 1;
        if(this.keys.KeyA || this.keys.ArrowLeft) mx = -1;
        if(this.keys.KeyD || this.keys.ArrowRight) mx = 1;

        // Combine Keyboard + Joystick
        let finalX = mx || this.p.dx;
        let finalY = my || this.p.dy;

        let nextX = this.p.x + finalX * 3.5;
        let nextY = this.p.y + finalY * 3.5;

        // Collision logic
        const gx = Math.floor(nextX / TILE);
        const gy = Math.floor(nextY / TILE);
        
        if(this.map[gy] && this.map[gy][gx] !== 'tree') {
            this.p.x = nextX;
            this.p.y = nextY;
            if(this.map[gy][gx] === 'house') {
                this.p.y += 20; // Bump away
                this.openDialogue("Welcome traveler! Beware of the shadows in the grass.");
            }
            // Encounter
            if((finalX !== 0 || finalY !== 0) && Math.random() < 0.006) this.startBattle();
        }
    }

    draw() {
        this.ctx.fillStyle = '#2d5e32';
        this.ctx.fillRect(0,0,this.canvas.width, this.canvas.height);

        const camX = this.canvas.width/2 - this.p.x;
        const camY = this.canvas.height/2 - this.p.y;

        this.ctx.font = "32px Arial";
        for(let y=0; y<MAP_DIM; y++) {
            for(let x=0; x<MAP_DIM; x++) {
                const tx = x * TILE + camX;
                const ty = y * TILE + camY;
                if(tx > -TILE && tx < this.canvas.width && ty > -TILE && ty < this.canvas.height) {
                    let s = '🌿';
                    if(this.map[y][x] === 'tree') s = '🌲';
                    if(this.map[y][x] === 'house') s = '🏠';
                    this.ctx.fillText(s, tx, ty + 30);
                }
            }
        }
        // Draw Player
        this.ctx.fillText('🧙‍♂️', this.canvas.width/2 - 16, this.canvas.height/2 + 10);
    }

    openDialogue(txt) {
        this.state = 'DIALOGUE';
        document.getElementById('diag-msg').innerText = txt;
        document.getElementById('dialogue').style.display = 'block';
    }

    closeDialogue() {
        this.state = 'MAP';
        document.getElementById('dialogue').style.display = 'none';
    }

    startBattle() {
        this.state = 'BATTLE';
        this.enemy = { hp: 40 + (this.p.lvl*10), sprite: ['👹','🐺','👻'][Math.floor(Math.random()*3)] };
        document.getElementById('e-sprite').innerText = this.enemy.sprite;
        document.getElementById('e-hp').innerText = this.enemy.hp;
        document.getElementById('battle-ui').style.display = 'flex';
    }

    doBattle(act) {
        if(act === 'atk') {
            let d = 10 + this.p.lvl*2;
            this.enemy.hp -= d;
            document.getElementById('battle-log').innerText = `Dealt ${d} damage!`;
        } else if(act === 'heal') {
            this.p.hp = Math.min(100, this.p.hp + 20);
            document.getElementById('battle-log').innerText = `Healed HP!`;
        } else {
            this.state = 'MAP';
            document.getElementById('battle-ui').style.display = 'none';
            return;
        }

        if(this.enemy.hp <= 0) {
            this.p.xp += 40;
            if(this.p.xp >= 100) { this.p.lvl++; this.p.xp=0; }
            document.getElementById('battle-log').innerText = "Victory!";
            setTimeout(() => {
                this.state = 'MAP';
                document.getElementById('battle-ui').style.display = 'none';
                this.syncUI();
            }, 1000);
        } else {
            setTimeout(() => {
                let ed = 5 + this.p.lvl;
                this.p.hp -= ed;
                document.getElementById('battle-log').innerText = `Enemy hits for ${ed}!`;
                this.syncUI();
                if(this.p.hp <= 0) location.reload();
            }, 600);
        }
        document.getElementById('e-hp').innerText = Math.max(0, this.enemy.hp);
    }

    syncUI() {
        document.getElementById('hp').innerText = this.p.hp;
        document.getElementById('lvl').innerText = this.p.lvl;
        document.getElementById('xp').innerText = this.p.xp;
    }

    loop() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.loop());
    }
}

const game = new RPG();
</script>
</body>
</html>
